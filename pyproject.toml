[project]
name = "interphyre"
version = "0.0.2"
description = "A physics simulator for causal inference research"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "box2d-kengz>=2.3.3",
    "box2d-py==2.3.8",
    "gymnasium>=1.2.3",
    "mkdocs>=1.6.1",
    "mkdocs-bibtex>=4.4.0",
    "mkdocs-get-deps>=0.2.2",
    "mkdocs-material>=9.7.6",
    "mkdocs-material-extensions>=1.3.1",
    "mkdocs-mermaid2-plugin>=1.2.3",
    "numpy==1.26",
    "opencv-python==4.8.1.78",
    "pandas>=2.3.3",
    "pygame>=2.6.1",
    "pytest>=9.0.2",
]

[tool.ruff]
line-length = 88

[tool.ruff.lint.per-file-ignores]
"tools/*" = ["E402"]
