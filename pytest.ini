[pytest]
testpaths = tests
addopts = -ra -m "not slow and not bundle_validation"
markers =
    fast: quick unit tests
    slow: tests that run multi-step simulations or timing comparisons
    comprehensive: slower integration tests
    intervention: tests requiring intervention-enabled configs
    solutions: solution validation tests tied to stored actions
    bundle_validation: full 10001-seed solution replay for all 25 level bundles
